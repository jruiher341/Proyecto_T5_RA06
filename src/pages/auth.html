<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso VIP | Thor Fitness</title>
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-tabs">
                <button id="tab-login" class="active">LOGIN</button>
                <button id="tab-register">REGISTRO</button>
            </div>

            <form id="login-form" class="auth-form">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-pass" required>
                </div>
                <button type="submit" class="btn btn-solid w-100">ENTRAR AL BOX</button>
            </form>

            <form id="register-form" class="auth-form hidden">
                <div class="input-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="reg-name" required>
                </div>
                <div class="input-group">
                    <label>Rol de acceso</label>
                    <select id="reg-role">
                        <option value="socio">Socio (Atleta)</option>
                        <option value="entrenador">Entrenador (Coach)</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-solid w-100">CREAR CUENTA</button>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
