<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thor Fitness</title>
    <link rel="icon" type="image/png" href="../assets/images/ThorFitness_logo.png">
    <link rel="stylesheet" href="../css/estilos.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <main class="body-unete">
        <nav class="barra-navegacion">
            <div class="contenedor-nav">
                <div class="logo"><img src="../assets/images/ThorFitness_logo.png" alt="image/png"></div>
                <ul class="menu">
                    <li><a href="../index.html">Inicio</a></li>
                    <li><a href="gimnasios.html">Gimnasios</a></li>
                    <li><a href="membresias.html">Precios</a></li>
                    <li><a href="sobre-nosotros.html">Sobre nosotros</a></li>
                    <li><a href="#" class="login">ÚNETE AHORA</a></li>
                </ul>
            </div>
        </nav>

        <section class="form-box">
            <h1>Formulario de Registro</h1>
            <p>Por favor, complete este formulario con la información requerida</p>
            
            <form id="registroForm" class="formulario-registro" onsubmit="registrarSocio(event)">
                <fieldset>
                    <label for="first-name">Ingrese su nombre: 
                        <input id="socio-nombre" name="first-name" type="text" required />
                    </label>
                    <label for="last-name">Ingrese su apellido: 
                        <input id="socio-apellido" name="last-name" type="text" required />
                    </label>
                    <label for="email">Ingrese su correo electrónico: 
                        <input id="socio-email" name="email" type="email" required />
                    </label>
                    <label for="telefono">Ingrese su teléfono: 
                        <input id="socio-telefono" name="telefono" type="text" required />
                    </label>
                </fieldset>

                <fieldset>
                    <label for="terms-and-conditions">
                        <input class="inline" id="terms-and-conditions" type="checkbox" required name="terms-and-conditions" /> 
                        Acepto los <a href="condiciones.html" target="_blank">términos y condiciones</a>
                    </label>
                </fieldset>

                <input type="submit" value="Enviar Datos" />
            </form>

            <section class="seccion-admin" style="margin-top: 40px; border-top: 1px solid #444; padding-top: 20px;">
                <button onclick="verSocios()" class="boton boton-secundario">VER USUARIOS REGISTRADOS</button>
                <div id="lista-socios"></div>
            </section>
        </section>
    </main>
    <footer>
        <p>&copy; Thor Fitness - Todos los derechos reservados</p>
        <div class="redes-sociales">
            <a href="https://www.facebook.com">
                <img src="../assets/images/icons8-facebook-48.png" alt="red-social">
            </a>
            <a href="https://www.twitter.com">
                <img src="../assets/images/icons8-twitter-48.png" alt="red-social">
            </a>
            <a href="https://www.instagram.com">
                <img src="../assets/images/icons8-instagram-48.png" alt="red-social">
            </a>
            <a href="https://www.youtube.com">
                <img src="../assets/images/icons8-youtube-48.png" alt="red-social">
            </a>
        </div>
    </footer>

    <script src="../js/javascript.js"></script>
</body>
</html>
