<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Thor Fitness</title>
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="dash-layout">
    <aside class="sidebar">
        <div class="logo">THOR<span>FIT</span></div>
        <nav class="side-nav">
            <a href="#" class="active">Resumen</a>
            <div id="nav-dynamic"></div>
            <a href="#" id="logout-btn" class="logout">Cerrar Sesión</a>
        </nav>
    </aside>

    <main class="dash-main">
        <header class="dash-header">
            <h1 id="welcome-title">Cargando...</h1>
            <div id="role-tag" class="badge">Socio</div>
        </header>

        <section id="socio-view" class="hidden">
            <div class="widgets-grid">
                <div class="card stat">
                    <h3>Membresía</h3>
                    <p class="text-gradient">PRO ANUAL</p>
                </div>
                <div class="card stat">
                    <h3>Mis Clases</h3>
                    <ul id="my-classes-list"></ul>
                </div>
            </div>
        </section>

        <section id="entrenador-view" class="hidden">
            <div class="card">
                <h3>Gestión de Alumnos</h3>
                <table class="pro-table">
                    <thead>
                        <tr>
                            <th>Alumno</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="alumnos-list"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
