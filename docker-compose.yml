version: '3.8'

services:
  # App Node.js
  app:
    build: .
    container_name: thor_app
    ports:
      - "3000:3000" # Puerto local : Puerto contenedor
    environment:
      - DB_HOST=db
    depends_on:
      - db

  # Base de Datos
  db:
    image: mysql:8.0
    container_name: thor_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: thor
      MYSQL_DATABASE: thor_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: thor_database
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_ARBITRARY: 1
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: thor
    depends_on:
      - db

volumes:
  mysql_data: